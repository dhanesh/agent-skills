# Tmux Agent Herdr-Lite integration
# Source from ~/.tmux.conf:
#   source-file ~/.tmux/agent-panes/tmux-agent.conf

# Human-friendly defaults inspired by Zellij: mouse, vi copy mode, discoverable menus,
# easy pane navigation/resizing, zoom, layouts, session tree, and popup dashboard.
set -g mouse on
set -g status-interval 5
set -g mode-keys vi
set -g pane-border-status top
set -g pane-border-format ' #P #{pane_current_command} #{pane_title} '
setw -g automatic-rename on
setw -g aggressive-resize on

# Keep existing left side simple; append agent summary to right side.
# If you already have a custom status-right, merge this manually rather than overwriting.
set -g status-left '#[bold]#S #[default]'
set -g status-right '#(~/.local/bin/agent-status-summary) #[default]%H:%M'

# Discoverability: Zellij-like help/dashboard and command menu.
bind-key ? display-popup -E -w 90% -h 80% '~/.local/bin/agent-dashboard; printf "\nPress Enter..."; read'
bind-key m run-shell '~/.local/bin/agent-menu'
bind-key S choose-tree -Zw

# Prefix + g: jump to first blocked agent
bind-key g run-shell '~/.local/bin/agent-jump blocked'

# Prefix + G: refresh status scan
bind-key G run-shell '~/.local/bin/agent-status-scan'

# Prefix + W/I/D: jump by state
bind-key W run-shell '~/.local/bin/agent-jump working'
bind-key I run-shell '~/.local/bin/agent-jump idle'
bind-key D run-shell '~/.local/bin/agent-jump done'

# Zellij-like pane ergonomics.
bind-key | split-window -h
bind-key - split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key H resize-pane -L 5
bind-key J resize-pane -D 3
bind-key K resize-pane -U 3
bind-key L resize-pane -R 5
bind-key z resize-pane -Z
bind-key Space next-layout
bind-key r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'

# Better copy/search defaults. In copy mode: / search, v begin selection, y copy.
bind-key [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy 2>/dev/null || xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || cat >/dev/null'
